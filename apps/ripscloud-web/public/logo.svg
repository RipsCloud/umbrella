<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title>RIPS Admin Dashboard</title>
  <desc>Modern dashboard interface for RIPS administration with charts and metrics</desc>
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="dashShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="#f8fafc" rx="20"/>
  
  <!-- Main Dashboard Container -->
  <rect x="20" y="20" width="216" height="216" rx="16" fill="url(#primaryGradient)" filter="url(#dashShadow)"/>
  
  <!-- Dashboard Header Bar -->
  <rect x="32" y="32" width="192" height="32" rx="8" fill="#ffffff" opacity="0.95"/>
  <circle cx="48" cy="48" r="6" fill="#3b82f6"/>
  <rect x="62" y="44" width="40" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="110" y="44" width="30" height="8" rx="4" fill="#e5e7eb"/>
  
  <!-- Metric Cards Row -->
  <g opacity="0.95">
    <!-- Card 1 -->
    <rect x="32" y="76" width="58" height="48" rx="6" fill="#ffffff"/>
    <rect x="38" y="82" width="24" height="4" rx="2" fill="#e5e7eb"/>
    <text x="40" y="104" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">R</text>
    <circle cx="75" cy="96" r="8" fill="#10b981" opacity="0.2"/>
    <path d="M72,96 l2,3 l5,-6" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Card 2 -->
    <rect x="99" y="76" width="58" height="48" rx="6" fill="#ffffff"/>
    <rect x="105" y="82" width="24" height="4" rx="2" fill="#e5e7eb"/>
    <text x="107" y="104" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">I</text>
    <rect x="130" y="94" width="18" height="12" rx="2" fill="url(#accentGradient)"/>
    
    <!-- Card 3 -->
    <rect x="166" y="76" width="58" height="48" rx="6" fill="#ffffff"/>
    <rect x="172" y="82" width="24" height="4" rx="2" fill="#e5e7eb"/>
    <text x="174" y="104" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">P</text>
    <circle cx="205" cy="96" r="8" fill="#3b82f6" opacity="0.2"/>
    <circle cx="205" cy="96" r="4" fill="#3b82f6"/>
  </g>
  
  <!-- Main Chart Area -->
  <rect x="32" y="136" width="126" height="88" rx="8" fill="#ffffff" opacity="0.95"/>
  
  <!-- Bar Chart -->
  <g transform="translate(42, 150)">
    <rect x="8" y="44" width="12" height="20" rx="2" fill="#3b82f6" opacity="0.7"/>
    <rect x="26" y="34" width="12" height="30" rx="2" fill="#3b82f6" opacity="0.8"/>
    <rect x="44" y="24" width="12" height="40" rx="2" fill="url(#primaryGradient)"/>
    <rect x="62" y="38" width="12" height="26" rx="2" fill="#3b82f6" opacity="0.7"/>
    <rect x="80" y="30" width="12" height="34" rx="2" fill="#3b82f6" opacity="0.85"/>
    <!-- Chart baseline -->
    <line x1="0" y1="66" x2="106" y2="66" stroke="#e5e7eb" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Side Stats Panel -->
  <rect x="166" y="136" width="58" height="88" rx="8" fill="#ffffff" opacity="0.95"/>
  
  <!-- Stat Rows -->
  <g transform="translate(172, 146)">
    <circle cx="6" cy="6" r="4" fill="#10b981"/>
    <rect x="14" y="4" width="28" height="4" rx="2" fill="#e5e7eb"/>
    
    <circle cx="6" cy="24" r="4" fill="#3b82f6"/>
    <rect x="14" y="22" width="24" height="4" rx="2" fill="#e5e7eb"/>
    
    <circle cx="6" cy="42" r="4" fill="#f59e0b"/>
    <rect x="14" y="40" width="32" height="4" rx="2" fill="#e5e7eb"/>
    
    <circle cx="6" cy="60" r="4" fill="#8b5cf6"/>
    <rect x="14" y="58" width="20" height="4" rx="2" fill="#e5e7eb"/>
  </g>
  
  <!-- RIPS Text Badge -->
  <g transform="translate(128, 188)">
    <rect x="-24" y="-8" width="48" height="16" rx="8" fill="url(#accentGradient)" opacity="0.9"/>
    <text x="0" y="2" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">RIPS</text>
  </g>
</svg>